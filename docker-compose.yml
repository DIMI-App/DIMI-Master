services:
  dimi:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dimi
    restart: always
    environment:
      DEBUG: 1
    networks:
      - internal
    volumes:
      - .:/dimi

  redis_dimi:
    image: redis
    container_name: redis_dimi
    restart: always
    networks:
      - internal

  mongodb_dimi:
    image: mongo:latest
    container_name: mongodb_dimi
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: dimi_celery
    networks:
      - internal
    volumes:
      - mongo_data:/data/db

  dimi_celery_worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: always
    depends_on:
      - redis_dimi
    networks:
      - internal

  dimi_celery_beat:
    build:
      context: .
      dockerfile: docker/beat.Dockerfile
    restart: always
    depends_on:
      - redis_dimi
    networks:
      - internal

  dimi_directus:
    image: directus/directus:latest
    restart: always
    volumes:
      - ./database:/directus/database
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions
    environment:
      KEY: "replace-with-random-value"
      SECRET: "replace-with-random-value"
      ADMIN_EMAIL: "superadmin@dimi.com"
      ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      DB_CLIENT: "pg"
      DB_HOST: "dimi_postgres"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: ${POSTGRES_DB_PASSWORD}
      DB_DATABASE: ${POSTGRES_DB_NAME}
      WEBSOCKETS_ENABLED: "true"
    networks:
      - internal

  dimi_postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

networks:
  internal:
    external: false

volumes:
  mongo_data: